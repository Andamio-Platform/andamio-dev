    properties:
      api_key_name:
        example: MyFirstKey
        type: string
      usage_Data:
        items:
          $ref: '#/definitions/UserUsageData'
        type: array
    type: object
  ValidTxTypesResponse:
    description: List of valid transaction types that can be registered with the TX
      State Machine.
    properties:
      types:
        description: List of valid transaction type strings
        example:
        - course_create
        - assignment_submit
        - access_token_mint
        items:
          type: string
        type: array
    type: object
  ValidateSignatureRequest:
    properties:
      session_id:
        type: string
      signature:
        $ref: '#/definitions/SignatureData'
    required:
    - session_id
    - signature
    type: object
  VerificationFailureResponse:
    description: Response when verification fails, containing error details.
    properties:
      error:
        description: "Error is a machine-readable error code.\n\t@example\tsession_expired"
        type: string
      message:
        description: "Message is a human-readable error description.\n\t@example\tThe
          verification session has expired. Please start a new session."
        type: string
      verified:
        description: "Verified is always false for failure responses.\n\t@example\tfalse"
        type: boolean
    type: object
  VerifyEmailRequest:
    properties:
      token:
        example: dGVzdC10b2tlbg==
        type: string
      token_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
    required:
    - token
    - token_id
    type: object
  VerifyEmailResponse:
    properties:
