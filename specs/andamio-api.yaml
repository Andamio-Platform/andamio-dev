  PendingTxResponse:
    description: Response containing the current state of a tracked transaction.
    properties:
      confirmed_at:
        description: Timestamp when the transaction was confirmed on-chain (RFC3339
          format, null if not yet confirmed)
        example: "2026-01-19T12:00:30Z"
        type: string
      created_at:
        description: Timestamp when the transaction was registered (RFC3339 format)
        example: "2026-01-19T12:00:00Z"
        type: string
      failure_reason:
        description: Failure reason code for permanent failures (e.g., TASK_NOT_FOUND,
          MODULE_NOT_FOUND)
        example: TASK_NOT_FOUND
        type: string
      instance_id:
        description: Optional instance ID (course_id or project_id)
        example: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
        type: string
      last_error:
        description: Last error message if the transaction failed
        example: ""
        type: string
      metadata:
        additionalProperties:
          type: string
        description: Optional metadata stored with the transaction
        type: object
      not_indexed_count:
        description: Number of 404 poll cycles (Andamioscan not yet indexed)
        example: 0
        type: integer
      retry_count:
        description: Number of retry attempts for confirmation polling (error retries
          only, not 404s)
        example: 0
        type: integer
      state:
        description: Current state in the transaction lifecycle
        enum:
        - pending
        - confirmed
        - updated
        - failed
        - expired
        example: pending
        type: string
      tx_hash:
        description: Transaction hash (64 hex characters)
        example: 8a3b5c7d9e1f2a4b6c8d0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4d6e8f0a2b
        type: string
      tx_type:
        description: Transaction type
        enum:
        - course_create
        - course_enroll
        - modules_manage
        - teachers_update
        - managers_manage
        - assignment_submit
        - assessment_assess
        - credential_claim
        - project_create
        - project_join
        - tasks_manage
        - task_submit
        - task_assess
        - project_credential_claim
        - blacklist_update
        - treasury_fund
        - access_token_mint
        example: assignment_submit
        type: string
      updated_at:
        description: Timestamp of the last state update (RFC3339 format)
        example: "2026-01-19T12:01:00Z"
        type: string
      user_id:
        description: User ID who registered the transaction
        example: user_abc123
        type: string
    type: object
