paths:
  /.well-known/jwks.json:
    get:
      description: Returns the public key(s) for verifying attestation JWTs. 3rd party
        applications use this endpoint to fetch the public key for offline JWT verification.
      operationId: jwks
      produces:
      - application/json
      responses:
        "200":
          description: JWKS containing public keys
          schema:
            $ref: '#/definitions/JWKSResponse'
        "500":
          description: Public key not available
          schema:
            $ref: '#/definitions/InternalServerErrorResponse'
      summary: Get JSON Web Key Set
      tags:
      - Auth
  /v1/admin/set-user-role:
    post:
      consumes:
      - application/json
      description: This endpoint allows an administrator to set a user's subscription
        tier.
      operationId: set-user-role
      parameters:
      - description: Set User Role Request Body - Contains the user ID and either
          the new tier ID or tier name (at least one must be provided).
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/SetUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated the user's role. Response wrapped in standard
            envelope.
          schema:
            $ref: '#/definitions/SetUserRoleResponseEnvelope'
        "400":
          description: Bad Request - The request body is malformed, missing required
            fields, or the provided tier ID/name is invalid.
          schema:
            $ref: '#/definitions/BadRequestErrorResponse'
        "401":
          description: Unauthorized - Authentication failed or user is not authorized.
          schema:
            $ref: '#/definitions/UnauthorizedErrorResponse'
        "403":
          description: Forbidden - The user IP is blacklisted or user does not have
            admin privileges.
          schema:
            $ref: '#/definitions/ForbiddenErrorResponse'
        "404":
          description: Not Found - The specified user was not found.
          schema:
            $ref: '#/definitions/NotFoundErrorResponse'
        "422":
          description: Unprocessable Entity - Validation failed. The request data
            is syntactically correct but semantically invalid.
          schema:
            $ref: '#/definitions/UnprocessableEntityErrorResponse'
        "429":
          description: Too Many Requests - The user has exceeded the rate limit for
            this endpoint. Please wait and try again later.
          schema:
            $ref: '#/definitions/TooManyRequestsErrorResponse'
        "500":
          description: Internal Server Error - An unexpected error occurred on the
            server. Please try again later or contact support.
          schema:
            $ref: '#/definitions/InternalServerErrorResponse'
      security:
      - BearerAuth: []
      summary: Set User Role
      tags:
      - Admin
      - Setting
      x-access-level: internal
      x-metadata-status: alpha
      x-operation-id: setUserRoleV1
      x-rate-limit-tier: admin
