      message:
        example: Email verified successfully
        type: string
      user_id:
        example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        type: string
    type: object
  WalletData:
    properties:
      change_address:
        description: An address, serialised as Bech32.
        type: string
      used_addresses:
        items:
          type: string
        type: array
    type: object
