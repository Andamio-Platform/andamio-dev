  /v2/tx/register:
    post:
      consumes:
      - application/json
      description: |-
        Registers a new pending transaction for tracking and automatic confirmation.
        After submitting a signed transaction to the Cardano network via wallet.submitTx(),
        call this endpoint with the tx_hash to register it with the TX State Machine.
        The Gateway will automatically poll Andamioscan for confirmation and update the
        database when the transaction is confirmed on-chain.

        **Transaction Flow:**
        1. BUILD - Call TX build endpoint (e.g., /tx/course/student/assignment/commit)
        2. SIGN - Sign the unsigned_tx with wallet.signTx()
        3. SUBMIT - Submit to network with wallet.submitTx() → get tx_hash
        4. REGISTER - Call this endpoint with tx_hash ← YOU ARE HERE
        5. POLL - Optionally poll /tx/status/{tx_hash} for state updates

        **States:** pending → confirmed → updated (or failed/expired)
      operationId: v2-tx-register
      parameters:
      - description: Transaction registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/RegisterPendingTxRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Transaction registered successfully
          schema:
            $ref: '#/definitions/PendingTxResponse'
        "400":
          description: Invalid request body or tx_type
          schema:
            $ref: '#/definitions/BadRequestResponse'
        "401":
          description: Missing or invalid API key
          schema:
            $ref: '#/definitions/UnauthorizedErrorResponse'
        "500":
          description: Failed to register transaction
          schema:
            $ref: '#/definitions/InternalServerErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Register pending transaction
      tags:
      - Tx/State
      x-access-level: public
  /v2/tx/status/{tx_hash}:
    get:
      description: |-
        Returns the current status of a registered transaction.
        Use this endpoint to poll for transaction confirmation after registering with /tx/register.

        **State Transitions:**
        - `pending` → Transaction registered, waiting for on-chain confirmation
        - `confirmed` → Andamioscan confirmed the transaction on-chain
        - `updated` → Database has been updated (final success state)
        - `failed` → Error during confirmation or DB update
        - `expired` → Transaction not confirmed within timeout (2 hours)

        **Recommended Polling:**
        - Wait ~30 seconds after submit before first poll (typical block time)
        - Poll every 10-15 seconds until state is `updated`, `failed`, or `expired`
      operationId: v2-tx-status
      parameters:
      - description: Transaction hash (64 hex characters)
        in: path
        name: tx_hash
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Transaction status
          schema:
            $ref: '#/definitions/PendingTxResponse'
        "400":
          description: tx_hash is required
          schema:
            $ref: '#/definitions/BadRequestResponse'
        "404":
          description: Transaction not found or expired from cache
          schema:
            $ref: '#/definitions/NotFoundErrorResponse'
        "500":
          description: Failed to get transaction status
          schema:
            $ref: '#/definitions/InternalServerErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get transaction status
      tags:
      - Tx/State
      x-access-level: public
  /v2/tx/stream/{tx_hash}:
    get:
      description: |-
        Opens a Server-Sent Events stream for real-time transaction state notifications.
        The stream sends the current state immediately on connect, then pushes state_change
        events as the transaction progresses through its lifecycle.
        The connection closes automatically when the transaction reaches a terminal state
        (updated, failed, or expired).

        **Event types:**
        - `state` — Current state on connect
        - `state_change` — State transition event
        - `complete` — Terminal state reached, stream closing

        **Heartbeat:** A comment line (`: heartbeat`) is sent every 30 seconds to keep the connection alive.
      operationId: v2-tx-stream
      parameters:
      - description: Transaction hash (64 hex characters)
        in: path
        name: tx_hash
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream of transaction state events
        "400":
          description: tx_hash is required
          schema:
            $ref: '#/definitions/BadRequestResponse'
        "404":
          description: Transaction not found
          schema:
            $ref: '#/definitions/NotFoundErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/InternalServerErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Stream transaction status
      tags:
      - Tx/State
      x-access-level: public
  /v2/tx/types:
    get:
      description: |-
        Returns the list of valid transaction types that can be registered with the TX State Machine.
        Use these values for the `tx_type` field when calling POST /tx/register.

        **Categories:**
        - **Course:** course_create, course_enroll, modules_manage, teachers_update, managers_manage, assignment_submit, assessment_assess, credential_claim
        - **Project:** project_create, project_join, tasks_manage, task_submit, task_assess, project_credential_claim, blacklist_update, treasury_fund
        - **User:** access_token_mint
      operationId: v2-tx-types
      produces:
      - application/json
      responses:
        "200":
          description: List of valid TX types
          schema:
            $ref: '#/definitions/ValidTxTypesResponse'
      security:
      - ApiKeyAuth: []
      summary: Get valid transaction types
      tags:
      - Tx/State
      x-access-level: public
