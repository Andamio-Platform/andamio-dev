# Andamio Transaction Loops — Canonical Reference
# Every developer workflow on Andamio, named and structured.
#
# Naming: {domain}.{subject}.{variant}
# Status: validated (tested against live stack) | stubbed (defined, not yet tested) | blocked (tested, hit known issue)
# Dependencies reference loop numbers, not names.
#
# Created: 2026-04-06
# Source: orch task "andamio-dev - add each Tx Loop and build cost estimation into each.md"

version: 2
last_updated: 2026-04-07

# Dependency graph:
#   (15) general.access-token
#    └──→ (1) course.setup
#          ├──→ (2) project.setup  [project requires course module as prerequisite]
#          ├──→ (3) course.credential
#          │         └──→ (4) project.credential ←── (2)
#          ├──→ (7) course.credential.refused  [variant of 3]
#          ├──→ (11) course.modules.ongoing    [variant of 1]
#          └──→ (12) course.teachers.rotate    [variant of 1]
#          (2) project.setup
#          ├──→ (8) project.credential.refused ←── (3) [BLOCKED: indexer]
#          ├──→ (9) project.credential.denied  ←── (3) [stubbed]
#          └──→ (10) project.tasks.replace     [variant of 2]
#   (16) general.auth.headless  [prerequisite for all loops]

loops:

  # ===========================================================================
  # HAPPY PATH — Setup
  # ===========================================================================

  - id: 1
    name: course.setup
    type: setup
    description: Create and publish a course with modules. Confirms all db-side operations (lesson content, etc).
    roles: [owner, teacher]
    prereqs: [general.access-token]
    steps:
      - tx: course_create
        role: owner
        endpoint: /v2/tx/instance/owner/course/create
        tx_type: course_create
        note: Response includes course_id (minted LocalStateNFT policy ID)
      - action: create_module_draft
        role: teacher
        note: >
          REQUIRED before modules_manage TX. Create module in DB with SLTs.
          CLI: andamio course create-module --course-id <id> --code 100 --title "..." --slt "SLT 1" --slt "SLT 2" --approve
          This creates DRAFT, adds SLTs, and approves (APPROVED) with computed slt_hash in one step.
      - action: set_pending_tx
        role: teacher
        note: >
          REQUIRED: advance module from APPROVED → PENDING_TX before minting.
          CLI: andamio course teacher update-module-status --course-id <id> --module-code 100 --status PENDING_TX
      - tx: modules_manage
        role: teacher
        endpoint: /v2/tx/course/teacher/modules/manage
        tx_type: modules_manage
        note: Gateway batch-confirms modules from PENDING_TX → ON_CHAIN. Fails if module is not in PENDING_TX.
      - action: publish_content
        role: teacher
        note: >
          Off-chain — save lesson content, introduction, and assignment via API.
          CLI: andamio course import <path> --course-id <id>
          IMPORTANT: assignment content MUST exist before students can create commitments.
    cost_estimate: "~111 ADA total (course_create: 110 service + 0.52 fee; modules_manage: 0.27 fee)"
    validated_fees:
      course_create: { fee_ada: 0.522, service_ada: 110.0 }
      modules_manage: { fee_ada: 0.268 }
    script: examples/course-lifecycle.sh (partial — also covers loop 3)
    status: validated
    validated_date: 2026-04-06
    known_gotchas:
      - "Module must have assignment content before students can enroll"
      - "Service fee is 100 ADA base + 10 ADA per teacher, not ~50 ADA"

  - id: 2
    name: project.setup
    type: setup
    description: Create a project with funded treasury and published tasks. Requires a course module as prerequisite.
    roles: [owner, manager]
    prereqs: [general.access-token, course.setup]
    prereq_note: Project requires a course module credential as prerequisite.
    steps:
      - tx: project_create
        role: owner
        endpoint: /v2/tx/instance/owner/project/create
        tx_type: project_create
        note: >
          Body: {"alias":"<owner>","managers":["<mgr>"],"course_prereqs":[["<course_id>",["<slt_hash>"]]]}
          Response includes project_id. Treasury UTxO created but NOT funded for task rewards.
      - action: create_draft_tasks
        role: manager
        note: >
          REQUIRED before tasks_manage TX. Create task records in DB (DRAFT status).
          CLI: andamio project task create <project-id> --title "..." --lovelace 5000000 --expiration 2026-12-31
          Tasks are confirmed by index fallback — no PENDING_TX issue like modules.
      - tx: treasury_fund
        role: owner
        endpoint: /v2/tx/project/user/treasury/add-funds
        tx_type: treasury_fund
        note: >
          REQUIRED: fund treasury with enough ADA to cover all task rewards.
          Body: {"alias":"<owner>","project_id":"<id>","deposit_value":[["lovelace",<total_rewards>]]}
          Without this, contributor join fails with INSUFFICIENT_FUNDS_TREASURY.
      - tx: tasks_manage
        role: manager
        endpoint: /v2/tx/project/manager/tasks/manage
        tx_type: tasks_manage
        note: >
          Body includes tasks_to_add, tasks_to_remove, deposit_value.
          Requires contributor_state_id (from project get response).
          Gateway confirms tasks via (project_state_id, task_index) fallback.
    cost_estimate: "~112 ADA total (project_create: 110 service + 1.30 fee; treasury_fund: 0.18 fee + deposit; tasks_manage: 0.32 fee)"
    validated_fees:
      project_create: { fee_ada: 1.303, service_ada: 110.0 }
      treasury_fund: { fee_ada: 0.175, note: "plus deposit amount" }
      tasks_manage: { fee_ada: 0.322 }
    script: examples/project-lifecycle.sh (partial — also covers loop 4)
    status: validated
    validated_date: 2026-04-06
    known_gotchas:
      - "Treasury is NOT funded at project creation — explicit treasury_fund TX required"
      - "contributor_state_id must be discovered via project get response (not documented in SYSTEM_REFERENCE §6.2)"
      - "Service fee is 100 ADA base + 10 ADA per manager, not ~50 ADA"

  # ===========================================================================
  # HAPPY PATH — Credentials
  # ===========================================================================

  - id: 3
    name: course.credential
    type: credential
    description: Student earns a single course credential. Commit, teacher assesses, student claims.
    roles: [student, teacher]
    prereqs: [course.setup]
    steps:
      - action: create_commitment
        role: student
        note: >
          REQUIRED before enrollment TX. Create off-chain commitment record.
          CLI: andamio course student create --course-id <id> --module-code 100
          Creates AWAITING_SUBMISSION record. Fails if module has no assignment content.
      - tx: assignment_submit
        role: student
        endpoint: /v2/tx/course/student/assignment/commit
        tx_type: assignment_submit
        note: >
          Body: {"alias":"<student>","course_id":"<id>","slt_hash":"<hash>","assignment_info":"<evidence>"}
          Transitions: AWAITING_SUBMISSION → SUBMITTED. assignment_info becomes evidence_hash on-chain.
      - tx: assessment_assess
        role: teacher
        endpoint: /v2/tx/course/teacher/assignments/assess
        tx_type: assessment_assess
        note: >
          Body: {"alias":"<teacher>","course_id":"<id>","assignment_decisions":[{"alias":"<student>","outcome":"accept"}]}
          Transitions: SUBMITTED → ACCEPTED.
      - tx: credential_claim
        role: student
        endpoint: /v2/tx/course/student/credential/claim
        tx_type: credential_claim
        note: >
          Body: {"alias":"<student>","course_id":"<id>"}
          On-chain NFT minted. No DB status change (credential is on-chain only).
    cost_estimate: "~1.00 ADA total (student: 0.37 + 0.36 = 0.73; teacher: 0.27)"
    validated_fees:
      assignment_submit: { fee_ada: 0.372, paid_by: student }
      assessment_assess: { fee_ada: 0.274, paid_by: teacher }
      credential_claim: { fee_ada: 0.356, paid_by: student }
    script: examples/course-lifecycle.sh (partial — also covers loop 1)
    status: validated
    validated_date: 2026-04-06
    known_gotchas:
      - "Off-chain commitment MUST be created before enrollment TX — gateway confirm returns 404 without it"
      - "Module MUST have assignment content before student can create commitment"

  - id: 4
    name: project.credential
    type: credential
    description: Contributor earns a project credential and ADA rewards. Requires both a project and the prerequisite course credential.
    roles: [contributor, manager]
    prereqs: [project.setup, course.credential]
    prereq_note: Contributor must hold course credential (prerequisite) and project must exist with funded tasks.
    steps:
      - tx: project_join
        role: contributor
        endpoint: /v2/tx/project/contributor/task/commit
        tx_type: project_join
        note: >
          Body: {"alias":"<contributor>","project_id":"<id>","contributor_state_id":"<csid>","task_hash":"<hash>","task_info":"<evidence>"}
          CLI auto-injects task_hash into registration metadata from the request body.
          Requires contributor to hold prerequisite course credential — Atlas returns 422 without it.
      - tx: task_assess
        role: manager
        endpoint: /v2/tx/project/manager/tasks/assess
        tx_type: task_assess
        note: >
          Body: {"alias":"<manager>","project_id":"<id>","contributor_state_id":"<csid>","task_decisions":[{"alias":"<contributor>","outcome":"accept"}]}
          Transitions: COMMITTED → ACCEPTED.
      - tx: project_credential_claim
        role: contributor
        endpoint: /v2/tx/project/contributor/credential/claim
        tx_type: project_credential_claim
        note: >
          Body: {"alias":"<contributor>","project_id":"<id>","contributor_state_id":"<csid>"}
          CLI auto-looks up task_hash from contributor's ACCEPTED commitment for registration metadata.
          Reward: task lovelace from escrow minus 5% commission. State deposit (~14.5 ADA) refunded.
    cost_estimate: "~1.27 ADA in fees (contributor: 0.56 + 0.36 = 0.92; manager: 0.36). Contributor deposits ~14.5 ADA at join (refunded at claim)."
    validated_fees:
      project_join: { fee_ada: 0.555, paid_by: contributor, note: "plus ~14.5 ADA state deposit (refunded at claim)" }
      task_assess: { fee_ada: 0.357, paid_by: manager }
      project_credential_claim: { fee_ada: 0.361, paid_by: contributor, note: "net positive: deposit refund + task reward - fee - 5% commission" }
    reward: ADA from treasury (minus 5% commission)
    script: examples/project-lifecycle.sh (partial — also covers loop 2)
    status: validated
    validated_date: 2026-04-06
    known_gotchas:
      - "task_hash must be in registration metadata — CLI auto-injects it since andamio-cli commit after 4ccd87e"
      - "contributor_state_id discovered via project get response"
      - "Treasury must be funded (loop 2 treasury_fund step) before contributor can join"

  # ===========================================================================
  # HAPPY PATH — Variants
  # ===========================================================================

  - id: 5
    name: project.credential.native-assets
    type: credential
    description: Same as project.credential but treasury is funded with native assets (tokens), not just ADA/lovelace. Tests multi-asset treasury and reward distribution.
    roles: [contributor, manager, owner]
    prereqs: [project.setup, course.credential]
    prereq_note: Project treasury must be funded with native assets. Contributor must hold prerequisite credential.
    steps:
      - tx: project_create
        role: owner
        note: Treasury funded with native asset + ADA
      - tx: tasks_manage
        role: manager
        note: Task rewards denominated in native asset
      - tx: project_join
        role: contributor
      - tx: task_assess
        role: manager
      - tx: project_credential_claim
        role: contributor
        note: Receives native asset reward from treasury
    cost_estimate: TBD — native asset handling may differ
    script: null
    status: stubbed

  - id: 6
    name: course.credential.sequential
    type: credential
    description: Multi-module course where each module is a prerequisite for the next. Student must earn module N before starting module N+1.
    roles: [student, teacher]
    prereqs: [course.setup]
    prereq_note: Course must have modules configured with sequential prerequisites.
    steps:
      - tx: assignment_submit
        role: student
        note: Module 1 commit
      - tx: assessment_assess
        role: teacher
        note: Module 1 accept
      - tx: credential_claim
        role: student
        note: Module 1 credential — unlocks Module 2
      - tx: assignment_submit
        role: student
        note: Module 2 commit (requires Module 1 credential)
      - tx: assessment_assess
        role: teacher
      - tx: credential_claim
        role: student
        note: Module 2 credential — repeat for N modules
    cost_estimate: ~1.32 ADA × N modules
    script: null
    status: stubbed
    notes: This is the real-world course experience. Tests prerequisite gating at the module level.

  # ===========================================================================
  # ALTERNATE OUTCOMES
  # ===========================================================================

  - id: 7
    name: course.credential.refused
    type: variant
    variant_of: course.credential
    description: Teacher refuses submission. Student resubmits. Teacher accepts. Student claims. Tests the "try again" path.
    roles: [student, teacher]
    prereqs: [course.setup]
    steps:
      - action: create_commitment
        role: student
        note: >
          Off-chain commitment must exist before enrollment TX.
          CLI: andamio course student create --course-id <id> --module-code <code>
      - tx: assignment_submit
        role: student
        endpoint: /v2/tx/course/student/assignment/commit
        tx_type: assignment_submit
        note: >
          Initial submission. Body: {"alias":"<student>","course_id":"<id>","slt_hash":"<hash>","assignment_info":"<evidence>"}
      - tx: assessment_assess
        role: teacher
        endpoint: /v2/tx/course/teacher/assignments/assess
        tx_type: assessment_assess
        note: >
          REFUSE decision. Body: {"alias":"<teacher>","course_id":"<id>","assignment_decisions":[{"alias":"<student>","outcome":"refuse"}]}
          DB status → REFUSED. On-chain evidence hash cleared. Student can resubmit.
      - tx: assignment_submit
        role: student
        endpoint: /v2/tx/course/student/assignment/commit
        tx_type: assignment_submit
        note: >
          Resubmission with improved evidence. Same endpoint and body shape as initial submit.
          Uses the same slt_hash. assignment_info is new evidence.
      - tx: assessment_assess
        role: teacher
        endpoint: /v2/tx/course/teacher/assignments/assess
        tx_type: assessment_assess
        note: >
          ACCEPT decision. Body: {"alias":"<teacher>","course_id":"<id>","assignment_decisions":[{"alias":"<student>","outcome":"accept"}]}
          DB status → ACCEPTED.
      - tx: credential_claim
        role: student
        endpoint: /v2/tx/course/student/credential/claim
        tx_type: credential_claim
        note: >
          Body: {"alias":"<student>","course_id":"<id>"}
          Credential NFT minted on-chain.
    protocol_note: "Refuse means 'try again' — distinct from project deny which is terminal. Student can resubmit any number of times."
    cost_estimate: "~1.65 ADA total (2× submit: 0.37 each; 2× assess: 0.27 each; 1× claim: 0.36)"
    validated_fees:
      assignment_submit_1: { fee_ada: 0.37, paid_by: student }
      assessment_assess_refuse: { fee_ada: 0.27, paid_by: teacher }
      assignment_submit_2: { fee_ada: 0.37, paid_by: student }
      assessment_assess_accept: { fee_ada: 0.27, paid_by: teacher }
      credential_claim: { fee_ada: 0.36, paid_by: student }
    script: null
    status: validated
    validated_date: 2026-04-07
    known_gotchas:
      - "Resubmission uses the same endpoint and slt_hash as initial submit — it's another assignment_submit TX, not an update"
      - "After REFUSE, DB shows commitment_status: REFUSED, source: db_only (indexer may lag on-chain status)"
      - "No need to re-create the off-chain commitment — the original one is reused for resubmission"

  - id: 8
    name: project.credential.refused
    type: variant
    variant_of: project.credential
    description: Manager refuses contribution. Contributor recommits. Manager accepts. Contributor claims.
    roles: [contributor, manager]
    prereqs: [project.setup, course.credential]
    steps:
      - tx: project_join
        role: contributor
        endpoint: /v2/tx/project/contributor/task/commit
        tx_type: project_join
        note: Initial commit to task.
      - tx: task_assess
        role: manager
        endpoint: /v2/tx/project/manager/tasks/assess
        tx_type: task_assess
        note: >
          REFUSE decision. Body includes {"outcome":"refuse"}.
          On-chain: contributor state transitions away from "committed".
          DB: commitment_status remains COMMITTED with task_outcome: refuse.
      - tx: task_action_recommit
        role: contributor
        endpoint: /v2/tx/project/contributor/task/action
        tx_type: task_submit
        note: >
          BLOCKED — recommit after refuse does NOT work as expected.
          project_join returns STATE_ERROR ("Contributor has wrong state").
          task/action (task_submit) lands on-chain but moves contributor to non-assessable state.
          After task/action: manager's task_assess returns STATE_ERROR ("Contributor is not committed").
          The protocol does not have a clean refuse → recommit → re-assess path for projects.
      - tx: task_assess
        role: manager
        note: "BLOCKED — cannot assess contributor who used task/action after refuse"
      - tx: project_credential_claim
        role: contributor
        note: "BLOCKED — depends on successful assessment"
    protocol_note: >
      KNOWN ISSUE (2026-04-07): The project refuse → recommit flow is blocked by an andamioscan
      indexer gap. After manager refuses (task_assess refuse), the on-chain state transitions correctly
      but the indexer does not process the refuse outcome (only Accept is indexed as of 2026-04-07).
      This causes the gateway confirm to fail, leaving the contributor in an inconsistent state.
      Fix is incoming in andamioscan. Re-test after indexer update lands.
      Symptoms observed during testing:
        1. project_join after refuse → STATE_ERROR "Contributor has wrong state"
        2. task/action (task_submit) after refuse → TX lands on-chain but indexer never confirms (not_indexed_count climbs)
        3. task_assess after task/action → STATE_ERROR "Contributor is not committed"
    cost_estimate: "TBD — flow blocked, re-test after andamioscan fix"
    validated_fees:
      project_join: { fee_ada: 0.56, paid_by: contributor }
      task_assess_refuse: { fee_ada: 0.36, paid_by: manager }
      task_action_recommit: { fee_ada: 0.36, paid_by: contributor, note: "TX lands on-chain but indexer can't confirm" }
    script: null
    status: blocked
    blocked_by: "andamioscan indexer — refuse outcome (constructor 1) not indexed"
    validated_date: 2026-04-07
    known_gotchas:
      - "Blocked by andamioscan indexer gap — refuse outcome not indexed, fix incoming"
      - "task/action endpoint (task_submit) creates a valid on-chain TX but the indexer never confirms it"
      - "After task/action, DB shows ACCEPTED but on-chain state is not assessable — data inconsistency"
      - "Course refuse flow works cleanly because course indexer handles refuse; project indexer does not yet"

  - id: 9
    name: project.credential.denied
    type: variant
    variant_of: project.credential
    description: Terminal expulsion. Manager denies contributor. Contributor removed, treasury assets clawed back.
    roles: [contributor, manager]
    prereqs: [project.setup, course.credential]
    steps:
      - tx: project_join
        role: contributor
        endpoint: /v2/tx/project/contributor/task/commit
        tx_type: project_join
        note: >
          Contributor commits to task. Standard project_join TX.
      - tx: task_assess
        role: manager
        endpoint: /v2/tx/project/manager/tasks/assess
        tx_type: task_assess
        note: >
          DENY decision. Body: {"alias":"<manager>","project_id":"<id>","contributor_state_id":"<csid>","task_decisions":[{"alias":"<contributor>","outcome":"deny"}]}
          Terminal — contributor permanently removed, treasury assets clawed back.
    outcome: Contributor removed. Treasury clawback.
    protocol_note: >
      NOT TESTED (2026-04-07): Could not validate deny flow in isolation.
      The test project's contributor state was corrupted by loop 8 testing
      (task_action TX put contributor in non-assessable state, Atlas returned 500).
      Needs clean-room test on a fresh project with a contributor that has only done project_join.
      Also blocked by same andamioscan indexer gap as loop 8 — deny (constructor 2) is not indexed.
    cost_estimate: "TBD — not tested"
    script: null
    status: stubbed
    known_gotchas:
      - "Indexer gap: andamioscan only indexes Accept (constructor 0). Refuse (constructor 1) and Deny (constructor 2) land on-chain but are not indexed."
      - "MUST test on a fresh contributor state — will likely be unblocked when andamioscan refuse/deny indexing lands"
      - "Requires a fresh project or second contributor wallet to test in isolation"

  # ===========================================================================
  # SETUP VARIANTS
  # ===========================================================================

  - id: 10
    name: project.tasks.replace
    type: variant
    variant_of: project.setup
    description: Manager removes a task and adds a replacement in a single tasks_manage TX. Only possible before any contributor commits to the task.
    roles: [manager]
    prereqs: [project.setup]
    steps:
      - tx: tasks_manage
        role: manager
        endpoint: /v2/tx/project/manager/tasks/manage
        tx_type: tasks_manage
        note: >
          Remove + add in one TX.
          Body: {"alias":"<mgr>","project_id":"<id>","contributor_state_id":"<csid>",
            "tasks_to_add":[{"project_content":"<new_content>","expiration_posix":<ms>,"lovelace_amount":<amount>,"native_assets":[]}],
            "tasks_to_remove":[{"project_content":"<old_content>","expiration_posix":<ms>,"lovelace_amount":<amount>,"native_assets":[]}],
            "deposit_value":[["lovelace",<new_task_reward>]]}
          CRITICAL: tasks_to_remove takes FULL TaskData objects that must EXACTLY match the on-chain task datum.
          Fields: project_content (text), expiration_posix (ms), lovelace_amount, native_assets.
          deposit_value covers the new task reward (removed task's reward returns to treasury automatically).
      - action: verify_replacement
        note: >
          Confirm old task is gone and new task exists.
          CLI: andamio project tasks <project-id> --output json
    cost_estimate: "~0.32 ADA (network fee only, no service fee)"
    validated_fees:
      tasks_manage_replace: { fee_ada: 0.32, note: "remove 1 + add 1 in same TX" }
    protocol_note: >
      Reward from removed task returns to treasury automatically.
      deposit_value in the TX body covers the NEW task's reward (not the total of add + remove).
      Only possible when no contributor has committed to the task being removed.
    script: null
    status: validated
    validated_date: 2026-04-07
    known_gotchas:
      - "tasks_to_remove needs FULL TaskData objects matching on-chain datum — NOT task hashes or strings"
      - "All TaskData fields required: project_content, expiration_posix, lovelace_amount, native_assets"
      - "If task data doesn't exactly match on-chain datum, Atlas returns STATE_ERROR 'Task to delete does not exist'"
      - "Cannot remove tasks that have active contributor commitments"
      - "Tasks created via tasks_manage may show as chain_only if no matching DB draft exists"

  - id: 11
    name: course.modules.ongoing
    type: variant
    variant_of: course.setup
    description: Add, update, or remove modules after initial course setup. Uses the same modules_manage TX as initial setup.
    roles: [teacher]
    prereqs: [course.setup]
    steps:
      - action: create_module_draft
        role: teacher
        note: >
          Create off-chain module record in DRAFT status, add SLTs, approve to compute slt_hash.
          CLI: andamio course create-module --course-id <id> --code 200 --title "..." --slt "SLT 1" --slt "SLT 2" --approve
          Creates DRAFT → adds SLTs → APPROVED in one step. slt_hash printed on success.
      - action: set_pending_tx
        role: teacher
        note: >
          Advance module from APPROVED → PENDING_TX before minting.
          CLI: andamio course teacher update-module-status --course-id <id> --module-code 200 --status PENDING_TX
      - tx: modules_manage
        role: teacher
        endpoint: /v2/tx/course/teacher/modules/manage
        tx_type: modules_manage
        note: >
          Body: {"alias":"<teacher>","course_id":"<id>","modules_to_add":[{"slts":["SLT text 1","SLT text 2"],"allowed_student_state_ids":[],"prereq_slt_hashes":[]}],"modules_to_update":[],"modules_to_remove":[]}
          All three arrays (modules_to_add, modules_to_update, modules_to_remove) are REQUIRED even when empty.
          modules_to_add takes objects with slts (text array), not module codes or strings.
          Gateway batch-confirms modules from PENDING_TX → ON_CHAIN.
      - action: verify_module
        note: >
          Confirm module is ON_CHAIN.
          CLI: andamio course modules <course-id>
    cost_estimate: "~0.27 ADA per modules_manage TX (network fee only)"
    validated_fees:
      modules_manage_add: { fee_ada: 0.27, note: "add one module with 2 SLTs" }
    script: null
    status: validated
    validated_date: 2026-04-07
    known_gotchas:
      - "modules_to_add takes objects with {slts, allowed_student_state_ids, prereq_slt_hashes} — NOT strings or module codes"
      - "Module must be in PENDING_TX status before minting — gateway rejects APPROVED or DRAFT modules"
      - "Updating SLTs changes slt_hash (on-chain identity). 'Update' is really burn + mint."
      - "Module code is off-chain only — never appears in the TX body, matched by slt_hash"

  - id: 12
    name: course.teachers.rotate
    type: variant
    variant_of: course.setup
    description: Add and/or remove teachers from a course. Owner-only operation.
    roles: [owner]
    prereqs: [course.setup]
    steps:
      - tx: teachers_update
        role: owner
        endpoint: /v2/tx/course/owner/teachers/manage
        tx_type: teachers_update
        note: >
          Body: {"alias":"<owner>","course_id":"<id>","teachers_to_add":["<alias>"],"teachers_to_remove":[]}
          Can add and remove in same tx. At least one teacher must remain.
          CLI: andamio tx run /v2/tx/course/owner/teachers/manage --skey <path> --tx-type teachers_update --body '<json>'
      - action: verify_teachers
        note: >
          Confirm teacher list updated on-chain and in DB.
          CLI: andamio course get <course-id> --output json | jq '.teachers'
    cost_estimate: "~0.28 ADA per tx (network fee only, no service fee)"
    validated_fees:
      teachers_update_add: { fee_ada: 0.28, note: "add one teacher" }
      teachers_update_remove: { fee_ada: 0.28, note: "remove one teacher" }
    script: null
    status: validated
    validated_date: 2026-04-07
    known_gotchas:
      - "tx_type is 'teachers_update' NOT 'teachers_manage' — registration fails with invalid tx_type if wrong"
      - "Endpoint path is /v2/tx/course/owner/teachers/manage but the tx_type for registration is teachers_update"
      - "Only the course owner can manage teachers, not existing teachers"

