  - id: 16
    name: general.auth.headless
    type: meta
    description: Headless wallet auth lifecycle. Not a TX loop but every other loop presupposes it.
    roles: [any]
    prereqs: []
    steps:
      - action: api_key_login
        note: >
          Store API key in CLI config. Required for all endpoints.
          CLI: andamio auth login --api-key <key>
          Verify: andamio auth status
      - action: headless_wallet_login
        note: >
          CIP-8 headless login — signs nonce with .skey file, receives JWT.
          CLI: andamio user login --skey <path/payment.skey> --alias <alias> --address <bech32-addr>
          Requires: --skey, --alias, --address (all three mandatory).
          Verify: andamio user status → shows "Session: active"
      - action: verify_session
        note: >
          Confirm authenticated operations work.
          CLI: andamio user me --output json
          Returns dashboard with counts, courses, projects. Large response.
          CLI: andamio user status → shows alias and session state.
      - action: switch_identity
        note: >
          Logout and login as different wallet. JWT is replaced, not stacked.
          CLI: andamio user logout && andamio user login --skey <other.skey> --alias <other> --address <other-addr>
          Verify: andamio user status → shows new alias.
      - action: session_expire_and_relogin
        note: >
          JWT expires after gateway-configured TTL (typically hours).
          CLI: andamio user status → shows "not authenticated" after expiry.
          Recovery: re-run andamio user login with same args.
          No explicit refresh command — just re-login.
    cost_estimate: null  # no on-chain cost
    docs: guides/developers/cli/transaction-signing.mdx
    script: null
    status: validated
    validated_date: 2026-04-07
    known_gotchas:
      - "All three flags required for headless login: --skey, --alias, --address. Missing --address gives clear error."
      - "skey permissions warning (444 vs 0600) is informational, does not block login"
      - "user me returns large dashboard JSON, not a simple alias/role object"
      - "No JWT refresh command — session expires silently, re-login is the recovery path"
      - "Logout clears JWT locally; server session may still be valid until TTL"
